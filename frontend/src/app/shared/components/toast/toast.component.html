<div class="fixed top-5 right-5 z-50 flex flex-col gap-2 pointer-events-none">
  @for (toast of toasts(); track toast.id) {
    <div [class]="getToastClasses(toast.type)" 
         class="transform translate-x-0 opacity-100"
         role="alert">
      <div class="flex justify-between items-center w-full">
        <span class="flex-1 mr-3">{{ toast.message }}</span>
        <button (click)="removeToast(toast.id)" 
                class="bg-none border-none text-xl font-bold cursor-pointer opacity-70 p-0 w-6 h-6 flex items-center justify-center rounded transition-opacity hover:opacity-100 hover:bg-black hover:bg-opacity-10" 
                aria-label="Cerrar">
          ×
        </button>
      </div>
    </div>
  }
</div>
